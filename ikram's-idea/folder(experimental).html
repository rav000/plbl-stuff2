<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Folder List Demo</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:24px;background:#f4f6f8}
    .top{display:flex;gap:8px;align-items:center;margin-bottom:16px}
    input,button{padding:8px;border:1px solid #cfd8dd;border-radius:6px}
    button{background:#0366d6;color:#fff;border:none;cursor:pointer}
    .cols{display:flex;gap:12px;flex-wrap:wrap}
    .folder{background:#fff;padding:12px;border-radius:8px;box-shadow:0 1px 3px rgba(16,24,40,.06);width:280px}
    .folder h3{margin:0 0 8px 0;display:flex;justify-content:space-between;align-items:center;font-size:16px}
    .items{list-style:none;padding:0;margin:8px 0}
    .items li{display:flex;justify-content:space-between;padding:6px;border-radius:6px;background:#f7fafc;margin-bottom:6px}
    .small{font-size:13px;color:#666}
    .trash{background:#e53e3e;border-radius:6px;padding:6px 8px}
    .muted{color:#666;font-size:13px}
  </style>
</head>
<body>
  <h2>Folder + List</h2>
  <div class="top">
    <input id="folderName" placeholder="Nama folder baru" />
    <button id="addFolderBtn">Tambah Folder</button>
    <span class="muted">(Data disimpan di browser)</span>
  </div>

  <div id="folders" class="cols"></div>

  <script>
    const storageKey = 'folders-v1'

    function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

    function load(){
      try{const v = localStorage.getItem(storageKey); return v?JSON.parse(v):[] }catch(e){return []}
    }

    function save(data){ localStorage.setItem(storageKey, JSON.stringify(data)) }

    function render(){
      const container = document.getElementById('folders')
      const data = load()
      container.innerHTML = ''
      data.forEach(folder=>{
        const el = document.createElement('div')
        el.className='folder'
        el.innerHTML = `
          <h3>
            <span contenteditable="true" data-id="${folder.id}" class="title">${escapeHtml(folder.title)}</span>
            <button class="trash" data-action="del" data-id="${folder.id}">Hapus</button>
          </h3>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input class="itemInput" placeholder="Tambah item..." style="flex:1" />
            <button data-action="addItem" data-id="${folder.id}">Tambah</button>
          </div>
          <ul class="items">
            ${folder.items.map((it,i)=>`<li><span>${escapeHtml(it)}</span><button data-action="rmItem" data-id="${folder.id}" data-index="${i}">✕</button></li>`).join('')}
          </ul>
        `
        container.appendChild(el)
      })

      // attach events
      container.querySelectorAll('[data-action]').forEach(btn=>{
        btn.addEventListener('click',e=>{
          const action = btn.dataset.action
          const id = btn.dataset.id
          if(action==='del') deleteFolder(id)
          if(action==='addItem'){
            const input = btn.parentElement.querySelector('.itemInput')
            if(input.value.trim()) addItem(id,input.value.trim()), input.value=''
          }
          if(action==='rmItem') removeItem(btn.dataset.id, Number(btn.dataset.index))
        })
      })

      container.querySelectorAll('.title').forEach(span=>{
        span.addEventListener('blur', e=>{
          const id = span.dataset.id
          updateFolderTitle(id, span.innerText.trim() || 'Untitled')
        })
      })
    }

    function escapeHtml(s){ return String(s).replace(/[&<>\"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;','\'':'&#39;' }[c])) }

    function addFolder(title){
      const data = load()
      data.unshift({id:uid(), title: title||'Folder baru', items:[]})
      save(data)
      render()
    }

    function deleteFolder(id){
      const data = load().filter(f=>f.id!==id)
      save(data); render()
    }

    function addItem(folderId, text){
      const data = load()
      const f = data.find(x=>x.id===folderId)
      if(!f) return
      f.items.push(text)
      save(data); render()
    }

    function removeItem(folderId, index){
      const data = load()
      const f = data.find(x=>x.id===folderId)
      if(!f) return
      f.items.splice(index,1)
      save(data); render()
    }

    function updateFolderTitle(id, newTitle){
      const data = load()
      const f = data.find(x=>x.id===id); if(!f) return
      f.title = newTitle; save(data); render()
    }

    document.getElementById('addFolderBtn').addEventListener('click', ()=>{
      const v = document.getElementById('folderName')
      addFolder(v.value.trim() || 'Folder baru')
      v.value=''
    })

    // initial demo content if empty
    if(load().length===0){
      save([
        {id:uid(), title:'Contoh Folder', items:['Item A','Item B']}
      ])
    }

    render()
  </script>
</body>
</html>
